<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head-fragment('Xác minh khôi phục')}"></head>
<body style="background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%); min-height: 100vh; display: flex; align-items: center;">

<div class="position-absolute top-0 start-0 p-4">
  <a th:href="@{/login}" class="text-white text-decoration-none fw-bold small">
    <i class="fa-solid fa-arrow-left me-2"></i>QUAY LẠI ĐĂNG NHẬP
  </a>
</div>

<div class="container">
  <div class="row justify-content-center">
    <div class="col-12 col-md-6 col-lg-4">
      <div class="card border-0 shadow-lg p-4 p-md-5 text-center" style="border-radius: 20px; background: rgba(255, 255, 255, 0.95);">

        <div class="mb-4">
          <i class="fa-solid fa-shield-halved fa-4x text-warning"></i>
        </div>

        <h3 class="fw-bold text-dark">Xác minh OTP</h3>
        <p class="text-muted small">Nhập mã 6 số đã được gửi đến email:<br>
          <strong th:text="${email}" class="text-primary"></strong>
        </p>

        <div th:if="${error}" class="alert alert-danger py-2 small shadow-sm" th:text="${error}"></div>
        <div th:if="${resend == 'success'}" class="alert alert-success py-2 small shadow-sm">Đã gửi lại mã mới!</div>

        <form th:action="@{/verify-reset}" method="post">
          <input type="hidden" name="email" th:value="${email}">
          <div class="mb-4">
            <input type="text" name="code" class="form-control text-center fw-bold"
                   placeholder="000000" maxlength="6" required autofocus
                   style="letter-spacing: 10px; font-size: 2rem; height: 4rem; border-radius: 12px; background: #f8f9fa;">
          </div>
          <button type="submit" class="btn btn-warning w-100 rounded-pill py-3 fw-bold shadow-sm text-white">
            XÁC MINH MÃ
          </button>
        </form>

        <form th:action="@{/resend-otp}" method="post" class="mt-3">
          <input type="hidden" name="email" th:value="${email}">
          <button type="submit" id="btnResend" class="btn btn-outline-secondary w-100 rounded-pill py-2 fw-bold" disabled>
            Gửi lại mã (<span id="countdown">60</span>s)
          </button>
        </form>

      </div>
    </div>
  </div>
</div>

<div th:replace="~{fragments/scripts :: scripts-fragment}"></div>

<script>
  let timeLeft = 60;
  const btnResend = document.getElementById('btnResend');
  const countdownSpan = document.getElementById('countdown');

  const resendTimer = setInterval(() => {
    timeLeft--;
    if (countdownSpan) countdownSpan.innerText = timeLeft;

    if (timeLeft <= 0) {
      clearInterval(resendTimer);
      btnResend.disabled = false;
      btnResend.innerHTML = 'Gửi lại mã OTP';
      btnResend.classList.replace('btn-outline-secondary', 'btn-outline-warning');
    }
  }, 1000);
</script>
</body>
</html>
