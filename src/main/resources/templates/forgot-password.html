<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head-fragment('Quên mật khẩu')}"></head>

<body style="background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%); min-height: 100vh; display: flex; align-items: center;">

<div class="position-absolute top-0 start-0 p-4">
    <a th:href="@{/login}" class="text-white text-decoration-none fw-bold small">
        <i class="fa-solid fa-arrow-left me-2"></i>QUAY LẠI ĐĂNG NHẬP
    </a>
</div>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-12 col-md-6 col-lg-4">
            <div class="card border-0 shadow-lg p-4 p-md-5 text-center" style="border-radius: 20px; background: rgba(255, 255, 255, 0.98);">

                <div class="mb-4">
                    <i class="fa-solid fa-key fa-4x text-primary"></i>
                </div>

                <h3 class="fw-bold text-dark">Quên mật khẩu?</h3>
                <p class="text-muted small mb-4">Nhập email của bạn để nhận mã OTP khôi phục mật khẩu.</p>

                <div th:if="${error}" class="alert alert-danger py-2 small mb-3" th:text="${error}"></div>

                <form th:action="@{/forgot-password}" method="post">
                    <div class="form-floating mb-4">
                        <input type="email" class="form-control border-0 bg-light" id="email" name="email" placeholder="name@example.com" required style="border-radius: 12px;">
                        <label for="email">Email tài khoản</label>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 rounded-pill py-3 fw-bold shadow-sm">
                        GỬI MÃ XÁC NHẬN
                    </button>
                </form>

            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments/scripts :: scripts-fragment}"></div>
</body>
</html>
