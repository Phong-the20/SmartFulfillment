<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đặt lại mật khẩu - SmartTech</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%); min-height: 100vh; display: flex; align-items: center; font-family: 'Poppins', sans-serif; }
        .auth-card { border-radius: 20px; background: rgba(255, 255, 255, 0.95); box-shadow: 0 15px 35px rgba(0,0,0,0.3); }
        .form-control { height: 3.5rem; border-radius: 12px; }
    </style>
</head>
<body>
<div class="container">
    <div class="row justify-content-center">
        <div class="col-12 col-md-6 col-lg-4">
            <div class="card auth-card p-4 p-md-5 text-center">
                <div class="mb-4"><i class="fa-solid fa-lock-open fa-4x text-success"></i></div>
                <h3 class="fw-bold text-success">Mật khẩu mới</h3>
                <p class="text-muted small mb-4">Thiết lập mật khẩu mới cho tài khoản của bạn.</p>

                <div th:if="${error}" class="alert alert-danger py-2 small" th:text="${error}"></div>

                <form th:action="@{/reset-password}" method="post">
                    <input type="hidden" name="token" th:value="${token}">

                    <div class="form-floating mb-4">
                        <input type="password" class="form-control" id="password" name="password" placeholder="Mật khẩu mới" minlength="6" required>
                        <label for="password">Mật khẩu mới</label>
                    </div>

                    <div class="form-floating mb-4">
                        <input type="password" class="form-control" id="confirmPassword" name="confirmPassword" placeholder="Xác nhận mật khẩu" required>
                        <label for="confirmPassword">Xác nhận mật khẩu</label>
                    </div>

                    <button type="submit" class="btn btn-success w-100 rounded-pill py-3 fw-bold shadow-sm">CẬP NHẬT MẬT KHẨU</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    const password = document.getElementById("password");
    const confirmPassword = document.getElementById("confirmPassword");

    function validatePassword(){
        if(password.value !== confirmPassword.value) {
            confirmPassword.setCustomValidity("Mật khẩu xác nhận không khớp!");
        } else {
            confirmPassword.setCustomValidity('');
        }
    }
    password.onchange = validatePassword;
    confirmPassword.onkeyup = validatePassword;
</script>
</body>
</html>
