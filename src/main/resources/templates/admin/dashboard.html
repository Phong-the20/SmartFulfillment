<div th:fragment="main-content">
    <div class="container-fluid px-4 py-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h2 class="fw-bold text-dark mb-1">
                    <i class="fa-solid fa-gauge-high me-2 text-primary"></i>BẢNG ĐIỀU KHIỂN
                </h2>
                <p class="text-muted mb-0 small">Phân tích hiệu suất kinh doanh SmartTech</p>
            </div>
            <div class="badge bg-white text-dark border shadow-sm px-3 py-2 rounded-3">
                <i class="fa-regular fa-clock me-1 text-primary"></i>
                <span th:text="${#temporals.format(#temporals.createNow(), 'HH:mm - dd/MM/yyyy')}"></span>
            </div>
        </div>

        <div class="row g-4 mb-4">
            <div class="col-xl-4 col-md-6">
                <div class="card bg-danger text-white border-0 shadow-sm rounded-4 h-100 position-relative">
                    <div class="card-body p-4">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <div class="small text-white-50 fw-bold text-uppercase mb-2">Tổng doanh thu</div>
                                <div class="h2 fw-bold mb-0"
                                     th:text="${totalRevenue != null ? #numbers.formatDecimal(totalRevenue, 0, 'COMMA', 0, 'POINT') : 0} + ' ₫'">0 ₫</div>
                            </div>
                            <i class="fa-solid fa-sack-dollar fa-3x opacity-25"></i>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-xl-4 col-md-6">
                <div class="card bg-primary text-white border-0 shadow-sm rounded-4 h-100 position-relative">
                    <div class="card-body p-4">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <div class="small text-white-50 fw-bold text-uppercase mb-2">Đơn hàng hiện có</div>
                                <div class="h2 fw-bold mb-0" th:text="${totalOrders}">0</div>
                            </div>
                            <i class="fa-solid fa-cart-shopping fa-3x opacity-25"></i>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-xl-4 col-md-12">
                <div class="card bg-success text-white border-0 shadow-sm rounded-4 h-100 position-relative">
                    <div class="card-body p-4">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <div class="small text-white-50 fw-bold text-uppercase mb-2">Mã sản phẩm lưu kho</div>
                                <div class="h2 fw-bold mb-0" th:text="${totalProducts}">0</div>
                            </div>
                            <i class="fa-solid fa-box-open fa-3x opacity-25"></i>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="card border-0 shadow-sm rounded-4 mb-4">
            <div class="card-header bg-white py-3 border-0 d-flex flex-wrap justify-content-between align-items-center border-bottom">
                <h5 class="mb-0 fw-bold text-dark me-3">
                    <i class="fas fa-chart-area me-2 text-primary"></i>PHÂN TÍCH DOANH THU
                </h5>
                <form th:action="@{/admin/dashboard}" method="get" class="d-flex align-items-center gap-2 mt-2 mt-md-0">
                    <div class="input-group input-group-sm">
                        <input type="date" name="startDate" th:value="${startDate}" class="form-control border-0 bg-light shadow-none">
                        <span class="input-group-text border-0 bg-light">đến</span>
                        <input type="date" name="endDate" th:value="${endDate}" class="form-control border-0 bg-light shadow-none">
                        <button type="submit" class="btn btn-primary px-3">
                            <i class="fa-solid fa-filter me-1"></i> Lọc
                        </button>
                    </div>
                    <a th:href="@{/admin/orders/export}" class="btn btn-outline-secondary btn-sm" title="Xuất Excel">
                        <i class="fa-solid fa-download"></i>
                    </a>
                </form>
            </div>
            <div class="card-body p-4">
                <div style="height: 380px;">
                    <canvas id="revenueChart"></canvas>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-12">
                <div class="card border-0 shadow-sm rounded-4">
                    <div class="card-header bg-white py-3 border-0 border-bottom">
                        <h5 class="mb-0 fw-bold text-dark">
                            <i class="fa-solid fa-fire-flame-curved me-2 text-danger"></i>TOP 4 SẢN PHẨM BÁN CHẠY
                        </h5>
                    </div>
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover align-middle mb-0">
                                <thead class="table-light">
                                <tr>
                                    <th class="ps-4">Sản phẩm</th>
                                    <th class="text-center">Mã SKU</th>
                                    <th class="text-end">Giá bán</th>
                                    <th class="text-center">Đã bán</th>
                                    <th class="text-end pe-4">Trạng thái</th>
                                </tr>
                                </thead>
                                <tbody>
                                <tr th:each="p : ${topProducts}">
                                    <td class="ps-4">
                                        <div class="d-flex align-items-center">
                                            <img th:src="${p.image}" class="rounded-3 me-3" style="width: 45px; height: 45px; object-fit: cover;" onerror="this.src='/img/default-product.png'">
                                            <div>
                                                <div class="fw-bold text-dark small" th:text="${p.name}">Tên sản phẩm</div>
                                            </div>
                                        </div>
                                    </td>
                                    <td class="text-center small text-muted" th:text="${p.sku}">SKU-123</td>
                                    <td class="text-end fw-bold text-primary" th:text="${#numbers.formatDecimal(p.price, 0, 'COMMA', 0, 'POINT')} + ' ₫'">0 ₫</td>
                                    <td class="text-center">
                                            <span class="badge bg-soft-success text-success rounded-pill px-3 py-2" style="background-color: #e8f5e9;">
                                                <i class="fa-solid fa-arrow-trend-up me-1"></i> <span th:text="${p.sold}">0</span>
                                            </span>
                                    </td>
                                    <td class="text-end pe-4">
                                        <span class="badge bg-success rounded-pill">Đang bán chạy</span>
                                    </td>
                                </tr>
                                <tr th:if="${#lists.isEmpty(topProducts)}">
                                    <td colspan="5" class="text-center py-5 text-muted">Chưa có dữ liệu bán hàng</td>
                                </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script th:inline="javascript">
        const chartLabels = /*[[${chartLabels}]]*/ [];
        const chartData = /*[[${chartData}]]*/ [];

        document.addEventListener('DOMContentLoaded', function() {
            const ctx = document.getElementById('revenueChart').getContext('2d');
            const gradient = ctx.createLinearGradient(0, 0, 0, 400);
            gradient.addColorStop(0, 'rgba(13, 110, 253, 0.3)');
            gradient.addColorStop(1, 'rgba(13, 110, 253, 0)');

            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: chartLabels,
                    datasets: [{
                        label: 'Doanh thu ngày',
                        data: chartData,
                        borderColor: '#0d6efd',
                        backgroundColor: gradient,
                        borderWidth: 3,
                        fill: true,
                        tension: 0.4,
                        pointBackgroundColor: '#fff',
                        pointBorderColor: '#0d6efd',
                        pointBorderWidth: 2,
                        pointRadius: 5,
                        pointHoverRadius: 7
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            backgroundColor: '#1a252f',
                            padding: 12,
                            callbacks: {
                                label: function(context) {
                                    return ' Doanh thu: ' + context.parsed.y.toLocaleString() + ' ₫';
                                }
                            }
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            grid: { color: 'rgba(0,0,0,0.05)' },
                            ticks: {
                                callback: function(value) {
                                    if (value >= 1000000) return (value / 1000000) + 'Tr';
                                    return value.toLocaleString();
                                }
                            }
                        },
                        x: { grid: { display: false } }
                    }
                }
            });
        });
    </script>
</div>
