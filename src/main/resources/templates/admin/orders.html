<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <div th:replace="~{fragments/head :: head-fragment('Hệ thống Quản trị | SmartTech')}"></div>
    <style>
        /* CSS để tạo khung Sidebar giống hình ông gửi */
        .sidebar { min-height: 100vh; background-color: #1a233a; color: white; width: 250px; position: fixed; }
        .sidebar .nav-link { color: #a0aec0; padding: 12px 20px; border-radius: 0; }
        .sidebar .nav-link:hover, .sidebar .nav-link.active { background-color: #2d3748; color: #fff; border-left: 4px solid #ecc94b; }
        .main-content { margin-left: 250px; background-color: #f7fafc; min-height: 100vh; padding: 20px; }
        .card-custom { border-radius: 15px; border: none; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
    </style>
</head>

<body>
<div class="d-flex">
    <div class="sidebar shadow">
        <div class="p-4 text-center">
            <h4 class="fw-bold text-white"><i class="fa-solid fa-microchip me-2"></i>SMARTTECH</h4>
        </div>
        <nav class="nav flex-column mt-3">
            <a class="nav-link" th:href="@{/}"><i class="fa-solid fa-shop me-3"></i>Về cửa hàng</a>

            <a class="nav-link" th:href="@{/admin}"><i class="fa-solid fa-chart-line me-3"></i>Bảng điều khiển</a>

            <a class="nav-link" th:href="@{/admin/warehouses}"><i class="fa-solid fa-warehouse me-3"></i>Bản đồ kho hàng</a>

            <a class="nav-link active" th:href="@{/admin/orders}"><i class="fa-solid fa-clipboard-list me-3"></i>Quản lý đơn hàng</a>

            <a class="nav-link" th:href="@{/admin/products}"><i class="fa-solid fa-box me-3"></i>Quản lý sản phẩm</a>

            <a class="nav-link" th:href="@{/admin/inventory}"><i class="fa-solid fa-file-import me-3"></i>Quản lý nhập kho</a>

            <div class="mt-5 p-3">
                <form th:action="@{/logout}" method="post">
                    <button type="submit" class="nav-link text-danger border-0 bg-transparent w-100 text-start">
                        <i class="fa-solid fa-right-from-bracket me-3"></i>Đăng xuất
                    </button>
                </form>
            </div>
        </nav>
    </div>

    <div class="main-content w-100">
        <div class="container-fluid">
            <div class="card card-custom p-4 mb-4">
                <div class="d-flex justify-content-between align-items-center">
                    <h4 class="fw-bold mb-0 text-dark"><i class="fa-solid fa-list-check me-2 text-primary"></i>QUẢN LÝ ĐƠN HÀNG</h4>
                    <span class="text-muted small">Chào Admin, Trần Thế Phong</span>
                </div>
            </div>

            <div class="card card-custom p-0 overflow-hidden">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="bg-light">
                        <tr class="text-muted small">
                            <th class="ps-4">MÃ ĐƠN</th>
                            <th>KHÁCH HÀNG</th>
                            <th>NGÀY ĐẶT</th>
                            <th>TỔNG TIỀN</th>
                            <th>TRẠNG THÁI</th>
                            <th class="text-center">THAO TÁC</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="o : ${orders}">
                            <td class="ps-4">
                                <a th:href="@{/orders/detail/{id}(id=${o.orderId})}" class="fw-bold text-primary text-decoration-none" th:text="${o.orderId}"></a>
                            </td>
                            <td>
                                <div class="fw-bold text-dark" th:text="${o.fullname}"></div>
                                <small class="text-muted" th:text="${o.email}"></small>
                            </td>
                            <td th:text="${#temporals.format(o.orderDate, 'dd/MM/yyyy HH:mm')}"></td>
                            <td class="fw-bold text-dark" th:text="${#numbers.formatDecimal(o.totalAmount, 0, 'COMMA', 0, 'POINT')} + ' ₫'"></td>
                            <td>
    <span th:if="${o.status == 'PAID'}" class="badge bg-success-subtle text-success border border-success rounded-pill px-3 py-2">
        <i class="fa-solid fa-check-double me-1"></i> Đã thanh toán (MoMo)
    </span>

                                <span th:if="${o.status == 'PENDING'}" class="badge bg-warning text-dark rounded-pill px-3 py-2">
        <i class="fa-solid fa-clock me-1"></i> Chờ xử lý
    </span>
                                <span th:if="${o.status == 'SHIPPING'}" class="badge bg-info text-white rounded-pill px-3 py-2">
        <i class="fa-solid fa-truck me-1"></i> Đang giao
    </span>
                                <span th:if="${o.status == 'COMPLETED'}" class="badge bg-success text-white rounded-pill px-3 py-2">
        <i class="fa-solid fa-circle-check me-1"></i> Hoàn thành
    </span>
                                <span th:if="${o.status == 'CANCELLED'}" class="badge bg-danger text-white rounded-pill px-3 py-2">
        <i class="fa-solid fa-xmark me-1"></i> Đã hủy
    </span>
                            </td>
                            <td class="text-center">
                                <div class="btn-group btn-group-sm" th:if="${o.status != 'COMPLETED' && o.status != 'CANCELLED'}">
                                    <form th:action="@{/admin/orders/update-status}" method="post" class="d-inline">
                                        <input type="hidden" name="orderId" th:value="${o.orderId}">
                                        <input type="hidden" name="status" value="SHIPPING">
                                        <button type="submit" class="btn btn-outline-primary border-0" title="Duyệt đơn">
                                            <i class="fa-solid fa-truck"></i>
                                        </button>
                                    </form>
                                    <form th:action="@{/admin/orders/update-status}" method="post" class="d-inline">
                                        <input type="hidden" name="orderId" th:value="${o.orderId}">
                                        <input type="hidden" name="status" value="COMPLETED">
                                        <button type="submit" class="btn btn-outline-success border-0" title="Hoàn thành">
                                            <i class="fa-solid fa-check-double"></i>
                                        </button>
                                    </form>
                                </div>
                                <span th:if="${o.status == 'COMPLETED'}" class="text-success small fw-bold">Xong <i class="fa-solid fa-circle-check"></i></span>
                                <span th:if="${o.status == 'CANCELLED'}" class="text-danger small fw-bold">Hủy <i class="fa-solid fa-circle-xmark"></i></span>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
