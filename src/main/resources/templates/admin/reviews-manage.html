<div th:fragment="main-content">
    <div class="container-fluid px-4 py-4">
        <h2 class="fw-bold text-dark mb-4">
            <i class="fa-solid fa-comments text-primary me-2"></i>QUẢN LÝ ĐÁNH GIÁ
        </h2>

        <div th:if="${successMsg}" class="alert alert-success border-0 rounded-pill shadow-sm mb-4">
            <i class="fa-solid fa-check-circle me-2"></i><span th:text="${successMsg}"></span>
        </div>

        <div class="card border-0 shadow-sm rounded-4 overflow-hidden">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                    <tr>
                        <th class="ps-4">Sản phẩm</th>
                        <th>Khách hàng</th>
                        <th>Đánh giá</th>
                        <th>Nội dung</th>
                        <th>Ngày gửi</th>
                        <th class="text-end pe-4">Thao tác</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="r : ${reviews}">
                        <td class="ps-4">
                            <span class="fw-bold text-dark" th:text="${r.skuCode}">SKU</span>
                        </td>
                        <td th:text="${r.username}">Username</td>
                        <td>
                                <span class="text-warning">
                                    <span th:each="i : ${#numbers.sequence(1, r.rating)}">⭐</span>
                                </span>
                        </td>
                        <td>
                            <div class="text-truncate" style="max-width: 300px;"
                                 th:text="${r.comment}" th:title="${r.comment}">Nội dung</div>
                        </td>
                        <td th:text="${#temporals.format(r.createdAt, 'dd/MM/yyyy HH:mm')}">Ngày</td>
                        <td class="text-end pe-4">
                            <a th:href="@{/admin/reviews/delete/{id}(id=${r.reviewId})}"
                               class="btn btn-outline-danger btn-sm rounded-circle"
                               onclick="return confirm('Bạn có chắc chắn muốn xóa đánh giá này không?')">
                                <i class="fa-solid fa-trash"></i>
                            </a>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(reviews)}">
                        <td colspan="6" class="text-center py-5 text-muted">Chưa có đánh giá nào để hiển thị.</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
