<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/head :: head-fragment('Hệ Thống Quản Trị')}"></head>
<body style="background-color: #f8f9fa;">
<div class="d-flex">

    <nav id="sidebar" class="shadow-lg" style="min-width: 260px; min-height: 100vh; background: #1a252f; color: white; position: sticky; top: 0;">
        <div class="p-4 text-center border-bottom border-secondary">
            <h4 class="fw-bold mb-0 text-primary"><i class="fa-solid fa-microchip me-2"></i>SMARTTECH</h4>
            <small class="text-uppercase text-muted" style="font-size: 10px; letter-spacing: 2px;">Admin Panel</small>
        </div>

        <ul class="nav flex-column p-3 gap-2">

            <li class="nav-item">
                <a th:class="'nav-link rounded p-3 ' + (${activeTab == 'home'} ? 'text-white bg-warning bg-opacity-25 fw-bold' : 'text-white-50')"
                   th:href="@{/}">
                    <i class="fa-solid fa-house-laptop me-2"></i> Về cửa hàng
                </a>
            </li>

            <li class="nav-item" sec:authorize="hasAuthority('ADMIN')">
                <a th:class="'nav-link rounded p-3 ' + (${activeTab == 'dashboard'} ? 'text-white bg-warning bg-opacity-25 fw-bold' : 'text-white-50')"
                   th:href="@{/admin/dashboard}">
                    <i class="fa-solid fa-chart-line me-2"></i> Bảng điều khiển
                </a>
            </li>

            <li class="nav-item">
                <a th:class="'nav-link rounded p-3 ' + (${activeTab == 'map'} ? 'text-white bg-warning bg-opacity-25 fw-bold' : 'text-white-50')"
                   th:href="@{/admin/map}">
                    <i class="fa-solid fa-map-location-dot me-2"></i> Bản đồ kho hàng
                </a>
            </li>

            <li class="nav-item">
                <a th:class="'nav-link rounded p-3 ' + (${activeTab == 'orders'} ? 'text-white bg-warning bg-opacity-25 fw-bold' : 'text-white-50')"
                   th:href="@{/admin/orders}">
                    <i class="fa-solid fa-cart-flatbed me-2"></i> Quản lý đơn hàng
                </a>
            </li>

            <li class="nav-item">
                <a th:class="'nav-link rounded p-3 ' + (${activeTab == 'products'} ? 'text-white bg-warning bg-opacity-25 fw-bold' : 'text-white-50')"
                   th:href="@{/admin/products}">
                    <i class="fa-solid fa-box me-2"></i> Quản lý sản phẩm
                </a>
            </li>

            <li class="nav-item">
                <a th:class="'nav-link rounded p-3 ' + (${activeTab == 'inventory'} ? 'text-white bg-warning bg-opacity-25 fw-bold' : 'text-white-50')"
                   th:href="@{/admin/inventory}">
                    <i class="fa-solid fa-warehouse me-2"></i> Quản lý nhập kho
                </a>
            </li>

            <li class="nav-item" sec:authorize="hasAuthority('ADMIN')">
                <a th:class="'nav-link rounded p-3 ' + (${activeTab == 'vouchers'} ? 'text-white bg-warning bg-opacity-25 fw-bold' : 'text-white-50')"
                   th:href="@{/admin/vouchers}">
                    <i class="fa-solid fa-ticket me-2"></i> Quản lý mã giảm giá
                </a>
            </li>

            <li class="nav-item">
                <a th:class="'nav-link rounded p-3 ' + (${activeTab == 'reviews'} ? 'text-white bg-warning bg-opacity-25 fw-bold' : 'text-white-50')"
                   th:href="@{/admin/reviews}">
                    <i class="fa-solid fa-comment-dots me-2"></i> Quản lý đánh giá
                </a>
            </li>

            <li class="nav-item" sec:authorize="hasAuthority('ADMIN')">
                <a th:class="'nav-link rounded p-3 ' + (${activeTab == 'accounts'} ? 'text-white bg-warning bg-opacity-25 fw-bold' : 'text-white-50')"
                   th:href="@{/admin/accounts}">
                    <i class="fa-solid fa-users-gear me-2"></i> Quản lý phân quyền
                </a>
            </li>

            <li class="nav-item" sec:authorize="hasAnyAuthority('ADMIN', 'STAFF')">
                <a th:class="'nav-link rounded p-3 ' + (${activeTab == 'chat'} ? 'text-white bg-primary fw-bold shadow-sm' : 'text-white-50 hover-text-white')"
                   th:href="@{/admin/chat}">
                    <i class="fa-solid fa-headset me-2"></i> Live Chat (CSKH)
                </a>
            </li>


            <li class="nav-item mt-5">
                <form th:action="@{/logout}" method="post">
                    <button type="submit" class="btn btn-outline-danger w-100 fw-bold border-0 text-start p-3 transition-hover">
                        <i class="fa-solid fa-right-from-bracket me-2"></i> Đăng xuất
                    </button>
                </form>
            </li>
        </ul>
    </nav>

    <div class="flex-grow-1 p-4">
        <div th:replace="~{${view} :: main-content}"></div>
    </div>
</div>

<div th:replace="~{fragments/scripts :: scripts-fragment}"></div>

<style>
    .nav-link { transition: all 0.3s ease; }
    .nav-link.text-white-50:hover {
        background-color: rgba(255, 255, 255, 0.05);
        color: white !important;
    }
    .transition-hover { transition: all 0.3s ease; }
    .transition-hover:hover { background-color: #dc3545; color: white !important; }
</style>
</body>
</html>
